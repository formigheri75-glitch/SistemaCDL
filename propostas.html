<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Propostas Recebidas</title>
        <link
            href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap"
            rel="stylesheet"
        />
        <link href="theme.css" rel="stylesheet" />
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
            <script src="config.js"></script>
            <script src="commons.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                    <side-nav
                        :brand="msg.nav.brand"
                        :items="menuItems"
                        active-href="propostas.html"
                    ></side-nav>
                <div class="content">
                    <div class="container">
                        <h1>{{ msg.propostas.title }}</h1>

                        <!-- Filter Section -->
                        <div class="filter-section">
                            <span class="filter-label"
                                >{{ msg.propostas.filtro.label }}</span
                            >
                            <button
                                class="filter-button"
                                :class="{ active: selectedFilter === 'all' }"
                                @click="selectedFilter = 'all'"
                            >
                                {{ msg.propostas.filtro.todas }} ({{
                                proposals.length }})
                            </button>
                            <button
                                class="filter-button"
                                :class="{ active: selectedFilter === 'pending' }"
                                @click="selectedFilter = 'pending'"
                            >
                                {{ msg.propostas.filtro.pendentes }} ({{
                                pendingCount }})
                            </button>
                            <button
                                class="filter-button"
                                :class="{ active: selectedFilter === 'accepted' }"
                                @click="selectedFilter = 'accepted'"
                            >
                                {{ msg.propostas.filtro.aceitas }} ({{
                                acceptedCount }})
                            </button>
                        </div>

                        <!-- Proposals Grid -->
                        <div
                            v-if="filteredProposals.length > 0"
                            class="proposals-grid"
                        >
                            <proposal-card
                                v-for="proposal in filteredProposals"
                                :key="proposal.id"
                                :proposal="proposal"
                                :getStatusLabel="getStatusLabel"
                            ></proposal-card>
                        </div>

                        <!-- Empty State -->
                        <div v-else class="empty-state">
                            <p>{{ msg.propostas.vazio }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const { createApp } = Vue;

            document.addEventListener("DOMContentLoaded", function () {
                if (window.messages) {
                    createApp({
                            components: { SideNav, ProposalCard },
                        data() {
                            return {
                                msg: window.messages,
                                    menuItems: [
                                        { label: window.messages.nav.dashboard, href: 'empresaDashboard.html' },
                                        { label: window.messages.nav.novoProblema, href: 'criaProblema.html' },
                                        { label: window.messages.nav.propostas, href: 'propostas.html' },
                                    ],
                                selectedFilter: "all",
                                proposals: [],
                                loading: true,
                                error: null,
                            };
                        },
                        async mounted() {
                            try {
                                const data = await window.ApiClient.get('/propostas');
                                this.proposals = (data || []).map(p => ({
                                    id: p.id,
                                    institution: p.instituicaoNome || p.instituicao || p.nomeInstituicao || 'Instituição',
                                    description: p.descricao || '',
                                    status: String(p.statusproposta || p.status || 'pending').toLowerCase().includes('aceit') ? 'accepted' : 'pending',
                                    rating: p.rating || 0,
                                    detailsLink: 'detalhesPropossta.html'
                                }));
                            } catch (error) {
                                console.error('Erro ao carregar propostas:', error);
                                this.error = 'Erro ao carregar propostas. Usando dados de exemplo.';
                                // Fallback para dados de exemplo
                                this.proposals = [
                                    {
                                        id: 1,
                                        institution: "UFRJ",
                                        description:
                                            "Solução completa de otimização com cache distribuído e query optimization.",
                                        status: "pending",
                                        rating: 4.8,
                                    },
                                    {
                                        id: 2,
                                        institution: "USP",
                                        description:
                                            "Implementação de Redis cluster com replicação automática e failover.",
                                        status: "pending",
                                        rating: 4.9,
                                    },
                                    {
                                        id: 3,
                                        institution: "UNICAMP",
                                        description:
                                            "Solução baseada em microserviços com API Gateway otimizado.",
                                        status: "pending",
                                        rating: 4.7,
                                    },
                                ];
                            } finally {
                                this.loading = false;
                            }
                        },
                        computed: {
                            filteredProposals() {
                                if (this.selectedFilter === "all") {
                                    return this.proposals;
                                }
                                return this.proposals.filter(
                                    (p) => p.status === this.selectedFilter,
                                );
                            },
                            pendingCount() {
                                return this.proposals.filter(
                                    (p) => p.status === "pending",
                                ).length;
                            },
                            acceptedCount() {
                                return this.proposals.filter(
                                    (p) => p.status === "accepted",
                                ).length;
                            },
                        },
                        methods: {
                            getStatusLabel(status) {
                                const labels = {
                                    pending: this.msg.propostas.status.pending,
                                    accepted:
                                        this.msg.propostas.status.accepted,
                                    rejected:
                                        this.msg.propostas.status.rejected,
                                };
                                return labels[status] || status;
                            },
                            viewProposal(id) {
                                window.location.href =
                                    "detalhesPropossta.html?proposal=" + id;
                            },
                        },
                    }).mount("#app");
                }
            });
        </script>
    </body>
</html>
