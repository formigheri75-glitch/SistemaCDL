<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
        <link href="theme.css" rel="stylesheet" />
        <title>Detalhes do Desafio - Instituição</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="config.js"></script>
        <script src="commons.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <side-nav
                    :brand="msg.tela.brand"
                    :items="menuItems"
                    active-href="tela-inicial-instituicao.html"
                ></side-nav>
                <div class="content">
                    <div class="detail-hero">
                        <div class="detail-top"><div class="detail-title"><h3>{{ challenge.titulo || 'Desafio não encontrado' }}</h3></div><span class="status">{{ challenge.statusdesafio || challenge.status || 'Aberto' }}</span></div>
                        <div class="detail-intro"><div class="illustration">{{ challengeIcon }}</div><div><p>{{ challenge.descricao || 'Descrição indisponível' }}</p></div></div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-box card"><h4>{{ msg.detalhesDesafio.requirements.title }}</h4><ul><li v-for="item in requirementsList" :key="item">{{ item }}</li></ul></div>
                        <div class="detail-box card"><h4>{{ msg.detalhesDesafio.additionalInfo.title }}</h4><ul><li v-for="item in extraInfoList" :key="item" v-html="item"></li></ul></div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            if (!window.ensureRole()) {
                throw new Error('Acesso negado. Você não tem permissão para acessar esta página.');
            }

            const { createApp } = Vue;
            createApp({
                components: { SideNav },
                data() {
                    return {
                        msg: window.messages,
                        menuItems: [
                            { label: 'Desafios', href: 'tela-inicial-instituicao.html' },
                            { label: 'Propostas', href: 'tela-propostas-instituicao.html' },
                        ],
                        challenge: {},
                    };
                },
                computed: {
                    requirementsList() {
                        if (Array.isArray(this.challenge.requisitos) && this.challenge.requisitos.length) return this.challenge.requisitos;
                        return [];
                    },
                    challengeIcon() {
                        return window.iconCategoria(this.challenge.categoria || this.challenge.areaconhecimento);
                    },
                    extraInfoList() {
                        const info = [];
                        const cat = this.challenge.categoria || this.challenge.areaconhecimento;
                        if (cat) info.push('<strong>Categoria:</strong> ' + cat);
                        const prio = this.challenge.nivelprioridade || this.challenge.nivelproblema;
                        if (prio) info.push('<strong>Prioridade:</strong> ' + prio);
                        const prazo = this.challenge.datalimite || this.challenge.prazo;
                        if (prazo) {
                            info.push('<strong>Prazo:</strong> ' + window.formatarData(prazo, prazo));
                        } else {
                            info.push('<strong>Prazo:</strong> Sem prazo definido');
                        }
                        return info.length ? info : [];
                    }
                },
                methods: {
                    getIdFromQuery() {
                        const params = new URLSearchParams(window.location.search);
                        return params.get('id');
                    },
                    async loadChallenge() {
                        const id = this.getIdFromQuery();
                        try {
                            if (id) {
                                    this.challenge = await window.loadDesafio(id);
                            } else {
                                    const list = await window.fetchDesafiosList();
                                this.challenge = (list && list[0]) ? list[0] : {};
                            }
                        } catch (e) { this.challenge = {}; }
                    }
                },
                mounted() {
                    this.loadChallenge();
                }
            }).mount('#app');
            document.title = 'Detalhes do Desafio - Instituição';
        </script>
    </body>
</html>
