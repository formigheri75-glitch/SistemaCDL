<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
        <link href="theme.css" rel="stylesheet" />
        <title>Envio da Solução - Coordenador</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <aside class="sidebar"><div class="brand"><span class="brand-icon"></span><span>{{ msg.tela.brand }}</span></div><div class="menu"><div class="menu-item">Desafios</div><div class="menu-item active">Minhas propostas</div><div class="menu-item">Notificações</div></div></aside>
                <div class="content">
                    <div class="form-wrapper">
                        <h1>Envio da solução</h1>
                        <div class="form-group"><label>Título da solução</label><input type="text" placeholder="Digite um título" /></div>
                        <div class="form-group"><label>Descrição</label><textarea placeholder="Explique a solução"></textarea></div>
                        <div class="form-row">
                            <div class="form-group"><label>Equipe</label><input type="text" placeholder="Nome da equipe" /></div>
                            <div class="form-group"><label>Prazo</label><input type="date" /></div>
                        </div>
                        <div class="button-group"><button class="btn-submit" type="button">Enviar solução</button><button class="btn-cancel" type="button">Cancelar</button></div>
                    </div>
                </div>
            </div>
        </div>
        <script>const { createApp } = Vue; createApp({ data() { return { msg: window.messages }; } }).mount('#app'); document.title = 'Envio da Solução - Coordenador';</script>
    </body>
</html>
