<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Recuperar Senha - Sistema de Desafios</title>
</head>
<body class="auth-layout auth-layout--recovery">
    <div id="app"></div>

    <script src="messages.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue;

        const App = {
            template: `
            <div class="auth-page">
                <main class="auth-shell">
                    <section class="auth-hero">
                        <span class="auth-hero-badge">Acesso</span>
                        <h1>{{ msg.recuperaSenha.title }}</h1>
                        <p>{{ msg.recuperaSenha.subtitulo }}</p>
                        <p class="auth-hero-copy">Recupere o acesso à sua conta com segurança e rapidez. Informe seu e-mail ou telefone e siga o fluxo orientado para voltar à plataforma sem complicação.</p>
                    </section>

                    <section class="auth-panel">
                        <div class="auth-card">
                            <div class="auth-card-top">
                                <div class="auth-brand-inline">
                                    <span>Desafios CDL</span>
                                </div>
                                <a class="auth-back-btn" href="login.html">Voltar ao login</a>
                            </div>

                            <div class="auth-form-header">
                                <div class="auth-form-kicker">Recuperação de acesso</div>
                                <h2 class="auth-form-title">{{ msg.recuperaSenha.title }}</h2>
                                <p class="auth-form-subtitle">{{ msg.recuperaSenha.subtitulo }}</p>
                            </div>

                            <form class="auth-form auth-form--single" @submit.prevent="submit">
                                <div v-if="success" class="form-success">✓ {{ success }}</div>

                                <div class="form-group form-full">
                                    <label>{{ msg.recuperaSenha.label }}</label>
                                    <input type="text" v-model="form.contato" :placeholder="msg.recuperaSenha.placeholder" :class="{ error: errors.contato }">
                                    <div v-if="errors.contato" class="form-error">{{ errors.contato }}</div>
                                </div>

                                <button class="submit-btn">{{ msg.recuperaSenha.recuperar }}</button>
                            </form>

                            <div class="auth-recovery-links">
                                <p>{{ msg.recuperaSenha.lembrou }}</p>
                                <a href="login.html">{{ msg.recuperaSenha.voltarLogin }}</a>
                            </div>
                        </div>
                    </section>
                </main>

                <footer class="auth-footer">
                    <p>{{ msg.footer }}</p>
                </footer>
            </div>
            `,
            data() { 
                return { 
                    msg: messages,
                    currentComponent: 'Form',
                    form: { contato: '' },
                    errors: {},
                    success: ''
                } 
            },
            methods: { 
                submit() {
                    this.errors = {};
                    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.form.contato);
                    const isPhone = /^\(\d{2}\)\s?\d{4,5}-\d{4}$/.test(this.form.contato);
                    
                    if (!this.form.contato) this.errors.contato = this.msg.validacao.campoObrigatorio;
                    else if (!isEmail && !isPhone) this.errors.contato = this.msg.recuperaSenha.erro;
                    
                    if (Object.keys(this.errors).length === 0) {
                        this.success = this.msg.recuperaSenha.sucesso;
                        setTimeout(() => { this.form.contato = ''; this.success = ''; }, 2000);
                    }
                }
            }
        };

        createApp(App).mount('#app');
    </script>
</body>
</html>
