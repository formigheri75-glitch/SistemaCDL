<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Recuperar Senha - Sistema de Desafios</title>
</head>
<body class="auth-layout auth-layout--recovery">
    <div id="app"></div>

    <script src="messages.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="config.js"></script>
    <script src="commons.js"></script>
    <script>
        const { createApp } = Vue;

        const App = {
            template: `
            <div class="auth-page">
                <main class="auth-shell">
                    <section class="auth-hero">
                        <span class="auth-hero-badge">{{ msg.recuperaSenha.badge }}</span>
                        <h1>{{ msg.recuperaSenha.title }}</h1>
                        <p>{{ msg.recuperaSenha.subtitulo }}</p>
                        <p class="auth-hero-copy">{{ msg.recuperaSenha.description }}</p>
                    </section>

                    <section class="auth-panel">
                        <div class="auth-card">
                            <div class="auth-card-top">
                                <div class="auth-brand-inline">
                                    <span>{{ msg.recuperaSenha.brand }}</span>
                                </div>
                                <a class="btn btn-secondary" href="login.html">{{ msg.recuperaSenha.voltarLogin }}</a>
                            </div>

                            <div class="auth-form-header">
                                <div class="auth-form-kicker">{{ msg.recuperaSenha.kicker }}</div>
                                <h2 class="auth-form-title">{{ msg.recuperaSenha.title }}</h2>
                                <p class="auth-form-subtitle">{{ msg.recuperaSenha.subtitulo }}</p>
                            </div>

                            <form class="auth-form auth-form--single" @submit.prevent="submit">
                                <div v-if="success" class="form-success">✓ {{ success }}</div>

                                <div class="form-group form-full">
                                    <label>{{ msg.recuperaSenha.label }}</label>
                                    <input type="text" v-model="form.contato" :placeholder="msg.recuperaSenha.placeholder" :class="{ error: errors.contato }">
                                    <div v-if="errors.contato" class="form-error">{{ errors.contato }}</div>
                                </div>

                                <button class="btn btn-primary">{{ msg.recuperaSenha.recuperar }}</button>
                            </form>

                            <div class="auth-recovery-links">
                                <p>{{ msg.recuperaSenha.lembrou }}</p>
                                <a href="login.html">{{ msg.recuperaSenha.voltarLogin }}</a>
                            </div>
                        </div>
                    </section>
                </main>

                <footer class="auth-footer">
                    <p>{{ msg.footer }}</p>
                </footer>
            </div>
            `,
            mixins: [window.AuthFormMixin],
            data() { 
                return { 
                    msg: messages,
                    form: { contato: '' }
                } 
            },
            methods: { 
                async submit() {
                    this.clearErrors();
                    
                    if (!window.FormValidator.validateRequired(this.form.contato)) {
                        this.setFieldError('contato', this.msg.validacao.campoObrigatorio);
                        return;
                    }
                    
                    if (!window.FormValidator.validateEmailOrPhone(this.form.contato)) {
                        this.setFieldError('contato', this.msg.recuperaSenha.erro);
                        return;
                    }
                    
                    try {
                        await this.submitForm('/usuarios/recuperar', { contato: this.form.contato });
                        this.form.contato = '';
                    } catch (err) {
                        this.setFieldError('contato', this.errors.general);
                    }
                }
            }
        };

        mountVuePage(App);
    </script>
</body>
</html>
