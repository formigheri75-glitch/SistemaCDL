<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Cadastro Instituição - Sistema de Desafios</title>
    <style>
        body {
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: var(--font-family);
        }
        main {
            max-width: 42rem;
            margin: 0 auto;
            padding: 3rem 1rem;
        }
        .form-container h1 {
            background: linear-gradient(to right, var(--color-secondary), #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-secondary);
        }
        .form-group input.error { 
            border-color: var(--color-error);
        }
        .form-error { 
            color: #fca5a5; 
            font-size: 0.875rem; 
            margin-top: 0.25rem;
        }
        .form-success { 
            background: var(--color-success-light);
            border: 1px solid var(--color-success);
            color: var(--color-success);
            padding: 0.75rem 1rem; 
            border-radius: 0.5rem; 
            margin-bottom: 1rem;
        }
        .button { 
            width: 100%; 
            background: linear-gradient(to right, var(--color-secondary), #7c3aed); 
            color: white; 
            font-weight: bold; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .button:hover { 
            transform: scale(1.05);
        }
        .button:active { 
            transform: scale(0.98);
        }
        footer { 
            border-top: 1px solid var(--color-border);
            background: var(--color-bg-primary);
            margin-top: 5rem;
        }
        footer p { 
            max-width: 80rem; 
            margin: 0 auto; 
            padding: 2rem 1rem; 
            text-align: center; 
            color: var(--color-text-muted);
            font-size: 0.875rem;
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body class="auth-layout auth-layout--institution">
    <div id="app"></div>

    <script src="messages.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="config.js"></script>
    <script src="commons.js"></script>
    <script>
        const { createApp } = Vue;

        const App = {
            template: `
            <div class="auth-page">
                <main class="auth-shell">
                    <section class="auth-hero">
                        <span class="auth-hero-badge">{{ msg.cadastroInstituicao.badge }}</span>
                        <h1>{{ msg.cadastroInstituicao.kicker }}</h1>
                        <p>{{ msg.cadastroInstituicao.subtitle }}</p>
                        <p class="auth-hero-copy">{{ msg.cadastroInstituicao.description }}</p>
                    </section>

                    <section class="auth-panel">
                        <div class="auth-card">
                            <div class="auth-card-top">
                                <div class="auth-brand-inline">
                                    <span>{{ msg.cadastroInstituicao.brand }}</span>
                                </div>
                                <a class="auth-back-btn" href="login.html">{{ msg.cadastroInstituicao.voltarLogin }}</a>
                            </div>

                            <div class="auth-form-header">
                                <div class="auth-form-kicker">{{ msg.cadastroInstituicao.kicker }}</div>
                                <h2 class="auth-form-title">{{ msg.cadastroInstituicao.title }}</h2>
                                <p class="auth-form-subtitle">{{ msg.cadastroInstituicao.formSubtitle }}</p>
                            </div>

                            <form class="auth-form" @submit.prevent="submit">
                                <div v-if="success" class="form-success">✓ {{ success }}</div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.nome }}</label>
                                    <input type="text" v-model="form.nome" :placeholder="msg.cadastroInstituicao.placeholderNome" :class="{ error: errors.nome }">
                                    <div v-if="errors.nome" class="form-error">{{ errors.nome }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.nomeContato }}</label>
                                    <input type="text" v-model="form.contato" :placeholder="msg.cadastroInstituicao.placeholderNomeContato" :class="{ error: errors.contato }">
                                    <div v-if="errors.contato" class="form-error">{{ errors.contato }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.telefone }}</label>
                                    <input type="tel" v-model="form.telefone" :placeholder="msg.cadastroInstituicao.placeholderTelefone" :class="{ error: errors.telefone }">
                                    <div v-if="errors.telefone" class="form-error">{{ errors.telefone }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.mec }}</label>
                                    <input type="text" v-model="form.mec" :placeholder="msg.cadastroInstituicao.placeholderMEC" :class="{ error: errors.mec }">
                                    <div v-if="errors.mec" class="form-error">{{ errors.mec }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.cnpj }}</label>
                                    <input type="text" v-model="form.cnpj" :placeholder="msg.cadastroInstituicao.placeholderCNPJ" :class="{ error: errors.cnpj }">
                                    <div v-if="errors.cnpj" class="form-error">{{ errors.cnpj }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.email }}</label>
                                    <input type="email" v-model="form.email" :placeholder="msg.cadastroInstituicao.placeholderEmail" :class="{ error: errors.email }">
                                    <div v-if="errors.email" class="form-error">{{ errors.email }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.senha }}</label>
                                    <input type="password" v-model="form.senha" :placeholder="msg.cadastroInstituicao.placeholderSenha" :class="{ error: errors.senha }">
                                    <div v-if="errors.senha" class="form-error">{{ errors.senha }}</div>
                                </div>

                                <div class="form-group">
                                    <label>{{ msg.cadastroInstituicao.confirmarSenha }}</label>
                                    <input type="password" v-model="form.confirma" :placeholder="msg.cadastroInstituicao.placeholderConfirmarSenha" :class="{ error: errors.confirma }">
                                    <div v-if="errors.confirma" class="form-error">{{ errors.confirma }}</div>
                                </div>

                                <button class="submit-btn">{{ msg.cadastroInstituicao.cadastrar }}</button>
                            </form>
                        </div>
                    </section>
                </main>

                <footer class="auth-footer">
                    <p>{{ msg.footer }}</p>
                </footer>
            </div>
            `,
            data() { 
                return { 
                    msg: messages,
                    currentComponent: 'Form',
                    form: { nome: '', contato: '', telefone: '', mec: '', cnpj: '', email: '', senha: '', confirma: '' },
                    errors: {},
                    success: ''
                } 
            },
            methods: { 
                goHome() { window.location.href = 'index.html'; },
                async submit() {
                    this.errors = {};
                    if (!this.form.nome) this.errors.nome = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    if (!this.form.contato) this.errors.contato = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    if (!this.form.telefone) this.errors.telefone = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    if (!this.form.mec) this.errors.mec = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    if (!this.form.cnpj) this.errors.cnpj = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    if (!this.form.email) this.errors.email = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.form.email)) this.errors.email = this.msg.cadastroInstituicao.validacao.emailInvalido;
                    if (!this.form.senha) this.errors.senha = this.msg.cadastroInstituicao.validacao.campoObrigatorio;
                    else if (this.form.senha.length < 6) this.errors.senha = this.msg.cadastroInstituicao.validacao.senhaCurta;
                    if (this.form.senha !== this.form.confirma) this.errors.confirma = this.msg.cadastroInstituicao.validacao.senhasNaoCorrespondem;
                    
                    if (Object.keys(this.errors).length === 0) {
                        try {
                            const response = await window.ApiClient.post('/usuarios', {
                                nome: this.form.nome,
                                email: this.form.email,
                                senha: this.form.senha,
                                telefone: this.form.telefone,
                                tipousuario: 'instituicao',
                                metadata: {
                                    contato: this.form.contato,
                                    mec: this.form.mec,
                                    cnpj: this.form.cnpj
                                }
                            });
                            
                            this.success = this.msg.cadastroInstituicao.sucesso + ' Redirecionando para login...';
                            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                        } catch (error) {
                            this.errors.submit = error.message || this.msg.cadastroInstituicao.validacao.erroGenerico;
                        }
                    }
                }
            }
        };

        mountVuePage(App);
    </script>
</body>
</html>
