<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
        <link href="theme.css" rel="stylesheet" />
        <title>Detalhes da Proposta - Coordenador</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <aside class="sidebar"><div class="brand"><span class="brand-icon"></span><span>{{ msg.tela.brand }}</span></div><div class="menu"><div class="menu-item">Desafios</div><div class="menu-item active">Minhas propostas</div><div class="menu-item">Notificações</div></div></aside>
                <div class="content">
                    <div class="detail-hero">
                        <div class="detail-top"><div class="detail-title"><h3>Detalhes da proposta</h3></div><span class="status">Em análise</span></div>
                        <div class="detail-intro"><div class="illustration"></div><div><p>Revisão da solução enviada e acompanhamento do processo de avaliação.</p><div class="button-group"><button class="btn btn-primary" type="button">Editar</button><button class="btn btn-secondary" type="button">Voltar</button></div></div></div>
                    </div>
                    <div class="detail-grid">
                        <div class="detail-box card"><h4>Plano de implementação</h4><p>Etapas, escopo e entregáveis da solução.</p></div>
                        <div class="detail-box card"><h4>Resultados esperados</h4><p>Impacto, métricas e validação prevista.</p></div>
                    </div>
                </div>
            </div>
        </div>
        <script>const { createApp } = Vue; createApp({ data() { return { msg: window.messages }; } }).mount('#app'); document.title = 'Detalhes da Proposta - Coordenador';</script>
    </body>
</html>
