<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Propostas - Admin (Empresas)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="config.js"></script>
    <script src="commons.js"></script>
    <script src="messages.js"></script>
</head>
<body class="tela-layout">
    <div id="app" class="screen">
        <div class="shell">
            <side-nav :brand="msg.tela.brand" :items="menuItems" active-href="empresa-propostas.html"></side-nav>
            <div class="content">
                <div class="section-head"><h2>Propostas (Empresas)</h2></div>

                <filter-section label="Status:" :options="optsStatus" :active-value="filtroStatus" @update:activeValue="filtroStatus = $event"></filter-section>

                <div class="list cards-grid" v-if="proposalsFiltradas.length">
                    <div v-for="p in proposalsFiltradas" :key="p.id" class="proposal-card card">
                        <div class="proposal-icon">📋</div>
                        <div class="proposal-main">
                            <h3>{{ p.titulo }}</h3>
                            <p>{{ p.descricao }}</p>
                            <div class="challenge-meta" style="display:flex; gap:1.5rem; flex-wrap:wrap; margin-top:0.5rem;">
                                <span><strong>Empresa:</strong> {{ p.empresaNome || '-' }}</span>
                                <span><strong>Instituição:</strong> {{ p.instituicaoNome || '-' }}</span>
                                <span><strong>Desafio:</strong> {{ p.desafioTitulo || '-' }}</span>
                            </div>
                        </div>
                        <div class="proposal-actions">
                            <status-badge :status="p.statusRaw"></status-badge>
                            <a class="mini-btn" :href="'detalhesPropossta.html?id=' + p.id">Ver</a>
                        </div>
                    </div>
                </div>
                <div v-else class="empty-state"><p>Nenhuma proposta encontrada.</p></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.ensureRole()) return;

            mountVuePage({
                components: { SideNav },
                data() {
                    return {
                        msg: window.messages,
                        menuItems: window.getAdminMenuItems(),
                        proposals: [],
                        empresas: [],
                        instituicoes: [],
                        desafiosMap: {},
                        filtroStatus: 'todos',
                        optsStatus: [
                            { value: 'todos', label: 'Todas', count: 0 },
                            { value: 'pendente', label: 'Pendentes', count: 0 },
                            { value: 'aprovada', label: 'Aprovadas', count: 0 },
                            { value: 'rejeitada', label: 'Rejeitadas', count: 0 },
                        ],
                    };
                },
                computed: {
                    propsPorStatus() {
                        const r = { pendente: 0, aprovada: 0, rejeitada: 0 };
                        this.proposals.forEach(p => {
                            const s = String(p.statusRaw || '').toLowerCase();
                            const lbl = window.getStatusLabel(s).toLowerCase();
                            if (lbl === 'aprovada' || lbl === 'aprovado') r.aprovada++;
                            else if (lbl === 'rejeitada' || lbl === 'rejeitado') r.rejeitada++;
                            else r.pendente++;
                        });
                        return r;
                    },
                    proposalsFiltradas() {
                        if (this.filtroStatus === 'todos') return this.proposals;
                        return this.proposals.filter(p => {
                            const lbl = window.getStatusLabel(p.statusRaw).toLowerCase();
                            return lbl === this.filtroStatus;
                        });
                    }
                },
                async mounted() {
                    try {
                        const [props, emps, insts, des] = await Promise.all([
                            window.ApiClient.get('/propostas'),
                            window.ApiClient.get('/empresas'),
                            window.ApiClient.get('/instituicoes'),
                            window.fetchDesafiosList()
                        ]);
                        this.empresas = emps || [];
                        this.instituicoes = insts || [];
                        (des || []).forEach(d => { if (d.id) this.desafiosMap[d.id] = d; });

                        this.proposals = (props || []).map(p => {
                            const empresaId = p.empresaid || p.empresaId || p.empresaID;
                            const empresa = (this.empresas || []).find(e => String(e.id) === String(empresaId));
                            const instId = p.instituicaoid || p.instituicaoID || p.instituicaoId;
                            const inst = (this.instituicoes || []).find(i => String(i.id) === String(instId));
                            const desafio = p.desafioid ? this.desafiosMap[p.desafioid] : null;
                            return {
                                id: p.id,
                                titulo: p.titulo || 'Proposta',
                                descricao: p.descricao || '',
                                statusRaw: p.statusproposta || '',
                                statusLabel: window.getStatusLabel(p.statusproposta || p.status) || 'Pendente',
                                empresaNome: empresa ? (empresa.nomefantasia || empresa.razaosocial) : 'N/A',
                                instituicaoNome: inst ? (inst.nomeinstituicao || inst.nome) : 'N/A',
                                desafioTitulo: desafio ? desafio.titulo : 'N/A',
                            };
                        });
                    } catch (e) { console.error('Erro ao carregar propostas', e); }
                },
                methods: { getStatusLabel: window.getStatusLabel },
                title: 'Propostas - Admin'
            });
        });
    </script>
</body>
</html>
