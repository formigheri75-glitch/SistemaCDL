<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Propostas - Admin (Empresas)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="config.js"></script>
    <script src="commons.js"></script>
    <script src="messages.js"></script>
</head>
<body class="tela-layout">
    <div id="app" class="screen">
        <div class="shell">
            <side-nav :brand="msg.tela.brand" :items="menuItems" active-href="empresa-propostas.html"></side-nav>
            <div class="content">
                <div class="section-head"><h2>Propostas (Empresas)</h2></div>
                <div class="list cards-grid">
                    <proposal-card v-for="p in proposals" :key="p.id" :proposal="p" :getStatusLabel="getStatusLabel"></proposal-card>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.ensureRole('admin')) return;

            mountVuePage({
                components: { SideNav, ProposalCard },
                data() { return { msg: window.messages, menuItems: window.getAdminMenuItems(), proposals: [] }; },
                async mounted() {
                    try {
                        const props = await window.ApiClient.get('/propostas');
                        this.proposals = (props || []).map(p => ({ id: p.id, title: p.titulo || p.title || 'Proposta', description: p.descricao || '', status: p.statusproposta || p.status }));
                    } catch (e) { console.error('Erro ao carregar propostas', e); }
                },
                methods: { getStatusLabel: window.getStatusLabel },
                title: 'Propostas - Admin'
            });
        });
    </script>
</body>
</html>
