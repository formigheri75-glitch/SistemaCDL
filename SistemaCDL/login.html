<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Login - Sistema de Desafios</title>
    <style>
        body {
            font-family: var(--font-family);
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 566px;
            position: relative;
            overflow: hidden;
        }
        .left-section {
            background: url("./images/v2_554.png") center/cover no-repeat;
            padding: clamp(40px, 8vw, 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            min-height: 100vh;
            width: 100%;
        }
        .left-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(232,239,248,0.4) 0%, rgba(219,234,254,0.4) 100%);
            z-index: 0;
        }
        .left-content {
            position: relative;
            z-index: 1;
        }
        .logo {
            width: clamp(150px, 20vw, 280px);
            height: auto;
            aspect-ratio: 253/142;
            background: url("./images/v2_571.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            margin-bottom: clamp(30px, 5vh, 50px);
        }
        .left-content h1 {
            color: var(--color-text-primary);
            font-weight: 600;
            font-size: clamp(40px, 8vw, 65px);
            line-height: 1.1;
            margin-bottom: clamp(20px, 4vh, 40px);
        }
        .left-content p {
            color: var(--color-text-secondary);
            font-weight: 300;
            font-size: clamp(18px, 5vw, 35px);
            line-height: 1.3;
            max-width: 600px;
        }
        .right-section {
            background: var(--color-bg-tertiary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(30px, 5vh, 60px);
            min-width: 300px;
        }
        .form-card {
            width: 100%;
            max-width: 455px;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 61px;
            padding: clamp(30px, 5vh, 60px);
            display: flex;
            flex-direction: column;
            gap: clamp(20px, 3vh, 30px);
        }
        .form-card h2 {
            color: var(--color-text-primary);
            font-weight: 700;
            font-size: clamp(20px, 8vw, 30px);
            text-align: center;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vh, 15px);
        }
        .form-label {
            color: var(--color-text-secondary);
            font-weight: 700;
            font-size: clamp(13px, 2vw, 17px);
        }
        .form-input {
            width: 100%;
            height: clamp(50px, 8vh, 70px);
            background: var(--color-bg-secondary);
            border: 2px solid var(--color-border);
            border-radius: 10px;
            padding: clamp(10px, 2vh, 20px);
            color: var(--color-text-primary);
            font-family: var(--font-family);
            font-size: clamp(13px, 2vw, 16px);
            transition: all 0.3s ease;
        }
        .form-input::placeholder {
            color: var(--color-text-muted);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }
        .submit-btn {
            width: 100%;
            height: clamp(50px, 8vh, 70px);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: clamp(16px, 3vw, 28px);
            cursor: pointer;
            transition: all 0.3s ease;
            margin: clamp(10px, 2vh, 20px) 0;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0px);
        }
        .form-links {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 20px);
            margin-top: clamp(10px, 2vh, 20px);
        }
        .forgot-link {
            text-align: right;
        }
        .forgot-link a {
            color: var(--color-primary);
            font-weight: 700;
            font-size: clamp(12px, 2vw, 16px);
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link a:hover {
            color: var(--color-primary-dark);
        }
        .signup-link {
            text-align: center;
            font-size: clamp(12px, 2vw, 16px);
            color: var(--color-text-muted);
        }
        .signup-link a {
            color: var(--color-primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .signup-link a:hover {
            color: var(--color-primary-dark);
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
            }
            .left-section {
                grid-row: 1;
                min-height: 40vh;
                background: url("./images/v2_554.png") center/contain no-repeat;
            }
            .left-section::before {
                background: linear-gradient(135deg, rgba(232,239,248,0.7) 0%, rgba(219,234,254,0.7) 100%);
            }
            .right-section {
                grid-row: 2;
                width: 100%;
                min-height: 60vh;
            }
        }

        @media (max-width: 640px) {
            .container {
                grid-template-columns: 1fr;
            }
            .left-section {
                min-height: auto;
                padding: clamp(20px, 3vh, 30px);
            }
            .form-card {
                border-radius: 40px;
            }
            .logo {
                width: clamp(100px, 25vw, 200px);
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: clamp(40px, 8vw, 60px);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-size: clamp(20px, 5vw, 28px);
            color: #0f172a;
            margin-bottom: clamp(30px, 5vh, 40px);
            font-weight: 700;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: clamp(20px, 3vh, 30px);
        }

        .modal-btn {
            padding: clamp(15px, 3vh, 20px);
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            width: 100%;
            color: white;
        }

        .modal-btn.empresa {
            background: var(--color-primary);
        }

        .modal-btn.empresa:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
        }

        .modal-btn.instituicao {
            background: var(--color-secondary);
        }

        .modal-btn.instituicao:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(139, 92, 246, 0.3);
        }

        .modal-divider {
            color: var(--color-text-muted);
            margin: clamp(10px, 2vh, 20px) 0;
            font-size: clamp(12px, 2vw, 16px);
        }
    </style>
</head>
<body>
    <script src="messages.js"></script>
    
    <div class="container">
        <div class="left-section">
            <div class="logo"></div>
            <div class="left-content">
                <h1 id="homeTitle">Conectando empresas à inovação</h1>
                <p id="homeSubtitle">Publique desafios e encontre soluções com instituições de ensino</p>
            </div>
        </div>
        <div class="right-section">
            <form class="form-card" onsubmit="handleLogin(event)">
                <h2 id="loginTitle">Login</h2>
                
                <div class="form-group">
                    <label class="form-label" id="emailLabel">E-mail</label>
                    <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" id="senhaLabel">Senha</label>
                    <input type="password" class="form-input" id="senha" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit" class="submit-btn" id="entrarBtn">Entrar</button>
                
                <div class="form-links">
                    <div class="forgot-link">
                        <a href="recuperaSenha.html" id="esqueceuLink">Esqueceu sua senha?</a>
                    </div>
                    <div class="signup-link">
                        <span id="naoTemConta">Não tem conta? <a href="javascript:void(0)" onclick="openModal()" id="cadastreLink">Cadastre-se</a></span>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Você deseja se cadastrar como</h2>
            <div class="modal-buttons">
                <a href="cadastroEmpresa.html" class="modal-btn empresa" id="modalEmpresa">Empresa</a>
                <div class="modal-divider">ou</div>
                <a href="cadastroInstituicao.html" class="modal-btn instituicao" id="modalInstituicao">Instituição de ensino</a>
            </div>
        </div>
    </div>

    <script>
        // Configuração da API
        const API_BASE_URL = 'http://localhost:5000';
        
        function updateTexts() {
            if (typeof messages !== 'undefined') {
                document.getElementById('homeTitle').textContent = messages.home.title;
                document.getElementById('homeSubtitle').textContent = messages.home.subtitle;
                document.getElementById('loginTitle').textContent = messages.login.title;
                document.getElementById('emailLabel').textContent = messages.login.email;
                document.getElementById('senhaLabel').textContent = messages.login.senha;
                document.getElementById('entrarBtn').textContent = messages.login.entrar;
                document.getElementById('esqueceuLink').textContent = messages.home.recuperaSenha.title;
                const naoTemSpan = document.getElementById('naoTemConta');
                naoTemSpan.innerHTML = messages.login.naoTem + ' <a href="javascript:void(0)" onclick="openModal()" id="cadastreLink">' + messages.login.criar + '</a>';
                document.getElementById('modalTitle').textContent = messages.login.modal.title;
                document.getElementById('modalEmpresa').textContent = messages.login.modal.empresa;
                document.getElementById('modalInstituicao').textContent = messages.login.modal.instituicao;
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const submitBtn = document.querySelector('.submit-btn');
            
            // Show loading state
            submitBtn.textContent = messages.login.loading;
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        senha: senha
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store JWT token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', email);
                    
                    // Show success message
                    alert(messages.login.success + '\n\n' + messages.login.redirectMessage);
                    
                    // Redirect to challenges page
                    setTimeout(() => {
                        window.location.href = 'page4.html';
                    }, 1000);
                } else {
                    // Show error message
                    alert(messages.login.errorPrefix + ' ' + data.erro);
                }
            } catch (error) {
                console.error('Erro ao fazer login:', error);
                alert(messages.login.connectionError + ' ' + API_BASE_URL);
            } finally {
                // Reset button state
                submitBtn.textContent = 'Entrar';
                submitBtn.disabled = false;
            }
        }

        function openModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
        }

        // Fechar modal ao clicar fora dele
        document.addEventListener('DOMContentLoaded', function() {
            updateTexts();
            const modalOverlay = document.getElementById('modal');
            modalOverlay.addEventListener('click', function(event) {
                if (event.target === modalOverlay) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
