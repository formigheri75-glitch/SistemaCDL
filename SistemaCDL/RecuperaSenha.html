<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Recuperar Senha - Sistema de Desafios</title>
    <style>
        body { 
            background: var(--color-bg-primary); 
            color: var(--color-text-primary); 
            font-family: var(--font-family);
        }
        .nav { 
            background: var(--color-bg-tertiary); 
            border-bottom: 1px solid var(--color-border);
            position: sticky; 
            top: 0; 
            z-index: 50; 
            padding: 0.5rem 0;
        }
        .nav-content { 
            max-width: 80rem; 
            margin: 0 auto; 
            padding: 0 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 4rem;
        }
        .nav-title { 
            font-size: 1.5rem; 
            font-weight: bold; 
            background: linear-gradient(to right, var(--color-primary), var(--color-info)); 
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent; 
            cursor: pointer;
        }
        .nav-links { 
            display: flex; 
            gap: 0.5rem;
        }
        .nav-links a { 
            padding: 0.5rem 1rem; 
            border-radius: 0.5rem; 
            text-decoration: none; 
            color: var(--color-text-muted); 
            font-weight: 500; 
            transition: all 0.2s;
        }
        .nav-links a:hover { 
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        main { 
            max-width: 42rem; 
            margin: 0 auto; 
            padding: 3rem 1rem;
        }
        .form-container { 
            background: var(--color-bg-secondary);
            border-radius: 0.75rem; 
            padding: 2rem; 
            border: 1px solid var(--color-border);
        }
        .form-container h1 { 
            font-size: 2rem; 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 1rem;
        }
        .form-container p { 
            text-align: center; 
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
        }
        .form-group { 
            margin-bottom: 1.5rem;
        }
        .form-group label { 
            display: block; 
            font-size: 0.875rem; 
            font-weight: 500; 
            color: var(--color-text-secondary);
            margin-bottom: 0.5rem;
        }
        .form-group label .required { 
            color: var(--color-error);
        }
        .form-group input { 
            width: 100%; 
            padding: 0.75rem 1rem; 
            background: var(--color-bg-primary);
            border: 2px solid var(--color-border);
            border-radius: 0.5rem; 
            color: var(--color-text-primary);
            transition: border-color 0.2s;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: var(--color-warning);
        }
        .form-group input.error { 
            border-color: var(--color-error);
        }
        .form-error { 
            color: #fca5a5; 
            font-size: 0.875rem; 
            margin-top: 0.25rem;
        }
        .form-success { 
            background: var(--color-success-light);
            border: 1px solid var(--color-success);
            color: var(--color-success);
            padding: 0.75rem 1rem; 
            border-radius: 0.5rem; 
            margin-bottom: 1rem;
        }
        .button { 
            width: 100%; 
            background: linear-gradient(to right, var(--color-warning), #ea580c); 
            color: white; 
            font-weight: bold; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            border: none; 
            cursor: pointer; 
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        .button:hover { 
            transform: scale(1.05);
        }
        .button:active { 
            transform: scale(0.98);
        }
        .links { 
            text-align: center;
        }
        .links p { 
            color: var(--color-text-secondary);
            margin-bottom: 0.5rem;
        }
        .links a { 
            color: var(--color-primary); 
            text-decoration: none; 
            font-weight: 500;
        }
        .links a:hover { color: #60a5fa; }
        footer { border-top: 1px solid #334155; background: #0f172a; margin-top: 5rem; }
        footer p { max-width: 80rem; margin: 0 auto; padding: 2rem 1rem; text-align: center; color: #6b7280; font-size: 0.875rem; }
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body class="common-layout">
    <div id="app"></div>

    <script src="messages.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue;

        const App = {
            template: `
            <div style="min-height: 100vh; background: #0f172a;">
                <nav class="nav">
                    <div class="nav-content">
                        <div class="nav-title" @click="goHome">{{ msg.nav.brand }}</div>
                        <div class="nav-links">
                            <a href="index.html">{{ msg.nav.home }}</a>
                            <a href="dashboard.html">{{ msg.nav.dashboard }}</a>
                            <a href="cadastroEmpresa.html">{{ msg.nav.empresa }}</a>
                            <a href="cadastroInstituicao.html">{{ msg.nav.instituicao }}</a>
                            <a href="recuperaSenha.html">{{ msg.nav.recuperarSenha }}</a>
                        </div>
                    </div>
                </nav>
                
                <main>
                    <div class="form-container">
                        <h1>{{ msg.recuperaSenha.title }}</h1>
                        <p>{{ msg.recuperaSenha.subtitulo }}</p>
                        <form @submit.prevent="submit">
                            <div v-if="success" class="form-success">✓ {{ success }}</div>
                            
                            <div class="form-group">
                                <label>{{ msg.recuperaSenha.label }}</label>
                                <input type="text" v-model="form.contato" :placeholder="msg.recuperaSenha.placeholder" :class="{ error: errors.contato }">
                                <div v-if="errors.contato" class="form-error">{{ errors.contato }}</div>
                            </div>
                            
                            <button class="button">{{ msg.recuperaSenha.recuperar }}</button>
                        </form>
                        
                        <div class="links">
                            <p>{{ msg.recuperaSenha.lembrou }} <a href="login.html">{{ msg.recuperaSenha.voltarLogin }}</a></p>
                        </div>
                    </div>
                </main>
                
                <footer>
                    <p>{{ msg.footer }}</p>
                </footer>
            </div>
            `,
            data() { 
                return { 
                    msg: messages,
                    currentComponent: 'Form',
                    form: { contato: '' },
                    errors: {},
                    success: ''
                } 
            },
            methods: { 
                goHome() { window.location.href = 'index.html'; },
                submit() {
                    this.errors = {};
                    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.form.contato);
                    const isPhone = /^\(\d{2}\)\s?\d{4,5}-\d{4}$/.test(this.form.contato);
                    
                    if (!this.form.contato) this.errors.contato = this.msg.validacao.campoObrigatorio;
                    else if (!isEmail && !isPhone) this.errors.contato = this.msg.recuperaSenha.erro;
                    
                    if (Object.keys(this.errors).length === 0) {
                        this.success = this.msg.recuperaSenha.sucesso;
                        setTimeout(() => { this.form.contato = ''; this.success = ''; }, 2000);
                    }
                }
            }
        };

        createApp(App).mount('#app');
    </script>
</body>
</html>
