<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propostas Recebidas</title>
    <link href="theme.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        nav {
            background: linear-gradient(135deg, var(--color-bg-secondary) 0%, rgba(30, 41, 59, 0.6) 100%);
            border-bottom: 1px solid var(--color-border);
            padding: clamp(1rem, 2vw, 1.5rem) clamp(1.5rem, 3vw, 2rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(1rem, 2vw, 2rem);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: clamp(0.5rem, 1vw, 1rem);
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-info) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: clamp(0.5rem, 1.5vw, 1.5rem);
            align-items: center;
        }

        nav a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.3s ease;
        }

        nav a:hover {
            color: var(--color-primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .container {
            padding: clamp(1.5rem, 3vw, 2rem);
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: clamp(1.5rem, 3vw, 2rem);
            color: var(--color-text-primary);
        }

        .filter-section {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 0.75rem;
            padding: clamp(1rem, 2vw, 1.5rem);
            margin-bottom: clamp(1.5rem, 2vw, 2rem);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: var(--color-text-secondary);
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            font-weight: 600;
        }

        .filter-button {
            padding: 0.5rem clamp(0.75rem, 1.5vw, 1rem);
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            border-radius: 0.375rem;
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .filter-button.active {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .filter-button:hover {
            border-color: var(--color-primary);
        }

        .proposals-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: clamp(1rem, 2vw, 1.5rem);
        }

        .proposal-card {
            background: var(--color-bg-secondary);
            border: 2px solid var(--color-border);
            border-radius: 0.75rem;
            padding: clamp(2rem, 3vw, 2.5rem);
            transition: all 0.3s ease;
            cursor: pointer;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: clamp(1.5rem, 2vw, 2rem);
            align-items: start;
        }

        .proposal-card:hover {
            border-color: var(--color-primary);
            transform: translateX(4px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
        }

        .proposal-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .proposal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }


        .proposal-institution {
            font-size: clamp(1rem, 2vw, 1.1rem);
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .proposal-status {
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .proposal-status.pending {
            background: var(--color-warning);
            color: white;
        }

        .proposal-status.accepted {
            background: var(--color-success);
            color: white;
        }

        .proposal-status.rejected {
            background: var(--color-error);
            color: white;
        }

        .proposal-description {
            color: var(--color-text-secondary);
            font-size: clamp(0.85rem, 1.5vw, 0.9rem);
            line-height: 1.5;
            flex-grow: 1;
        }

        .proposal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
            gap: 1rem;
            flex-wrap: wrap;
        }

        .proposal-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            color: var(--color-text-secondary);
        }

        .proposal-button {
            padding: clamp(0.5rem, 1vw, 0.75rem) clamp(1rem, 2vw, 1.5rem);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: clamp(0.75rem, 1.5vw, 0.85rem);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .proposal-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: clamp(2rem, 4vw, 3rem);
            color: var(--color-text-secondary);
        }

        .empty-state p {
            font-size: clamp(0.95rem, 1.5vw, 1.05rem);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }

            nav ul {
                width: 100%;
                flex-wrap: wrap;
            }

            .proposals-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 640px) {
            nav {
                padding: 1rem;
            }

            nav ul {
                flex-direction: column;
                gap: 0.5rem;
                width: 100%;
            }

            nav a {
                width: 100%;
            }

            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .filter-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .filter-button {
                width: 100%;
            }

            .proposals-grid {
                grid-template-columns: 1fr;
            }

            .proposal-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .proposal-button {
                width: 100%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .proposal-card {
            animation: fadeIn 0.6s ease;
        }
    </style>
</head>
<body class="tela-layout">
    <div class="screen">
        <div class="shell">
            <aside class="sidebar">
                <div class="sidebar-brand">
                    <a href="index.html">Desafios</a>
                </div>
                <nav class="sidebar-menu">
                    <a href="index.html" class="menu-item">Início</a>
                    <a href="dashboard.html" class="menu-item">Dashboard</a>
                    <a href="page4.html" class="menu-item">Desafios</a>
                    <a href="propostas.html" class="menu-item active">Propostas</a>
                </nav>
            </aside>
            <div class="content">
                <div id="app">
                    <div class="container">
                        <h1>{{ msg.propostas.title }}</h1>

                        <!-- Filter Section -->
                        <div class="filter-section">
                            <span class="filter-label">{{ msg.propostas.filtro.label }}</span>
                            <button 
                                class="filter-button"
                                :class="{ active: selectedFilter === 'all' }"
                                @click="selectedFilter = 'all'"
                            >
                                {{ msg.propostas.filtro.todas }} ({{ proposals.length }})
                            </button>
                            <button 
                                class="filter-button"
                                :class="{ active: selectedFilter === 'pending' }"
                                @click="selectedFilter = 'pending'"
                            >
                                {{ msg.propostas.filtro.pendentes }} ({{ pendingCount }})
                            </button>
                            <button 
                                class="filter-button"
                                :class="{ active: selectedFilter === 'accepted' }"
                                @click="selectedFilter = 'accepted'"
                            >
                                {{ msg.propostas.filtro.aceitas }} ({{ acceptedCount }})
                            </button>
                        </div>

                        <!-- Proposals Grid -->
                        <div v-if="filteredProposals.length > 0" class="proposals-grid">
                            <div v-for="proposal in filteredProposals" :key="proposal.id" class="proposal-card">
                                <div class="proposal-content">
                                    <div class="proposal-institution">{{ proposal.institution }}</div>
                                    <div class="proposal-description">
                                        {{ proposal.description }}
                                    </div>
                                    <div class="proposal-footer">
                                        <div class="proposal-rating">
                                            {{ proposal.rating }}/5.0
                                        </div>
                                    </div>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 1rem; align-items: flex-end; min-width: 140px;">
                                    <span :class="['proposal-status', proposal.status]">{{ getStatusLabel(proposal.status) }}</span>
                                    <button class="proposal-button" @click="viewProposal(proposal.id)">
                                        {{ msg.propostas.verDetalhes }}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Empty State -->
                        <div v-else class="empty-state">
                            <p>{{ msg.propostas.vazio }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="messages.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    msg: messages,
                    selectedFilter: 'all',
                    proposals: [
                        {
                            id: 1,
                            institution: 'UFRJ',
                            description: 'Solução completa de otimização com cache distribuído e query optimization.',
                            status: 'pending',
                            rating: 4.8
                        },
                        {
                            id: 2,
                            institution: 'USP',
                            description: 'Implementação de Redis cluster com replicação automática e failover.',
                            status: 'pending',
                            rating: 4.9
                        },
                        {
                            id: 3,
                            institution: 'UNICAMP',
                            description: 'Solução baseada em microserviços com API Gateway otimizado.',
                            status: 'pending',
                            rating: 4.7
                        },
                        {
                            id: 4,
                            institution: 'PUC-Rio',
                            description: 'Otimização incremental com foco em batch processing e queues.',
                            status: 'accepted',
                            rating: 4.6
                        },
                        {
                            id: 5,
                            institution: 'UFMG',
                            description: 'Implementação de GraphQL com data loader e batch requests.',
                            status: 'pending',
                            rating: 4.5
                        },
                        {
                            id: 6,
                            institution: 'FGV',
                            description: 'Solução com serverless architecture e AWS Lambda optimization.',
                            status: 'pending',
                            rating: 4.7
                        }
                    ]
                }
            },
            computed: {
                filteredProposals() {
                    if (this.selectedFilter === 'all') {
                        return this.proposals;
                    }
                    return this.proposals.filter(p => p.status === this.selectedFilter);
                },
                pendingCount() {
                    return this.proposals.filter(p => p.status === 'pending').length;
                },
                acceptedCount() {
                    return this.proposals.filter(p => p.status === 'accepted').length;
                }
            },
            methods: {
                getStatusLabel(status) {
                    const labels = {
                        pending: this.msg.propostas.status.pending,
                        accepted: this.msg.propostas.status.accepted,
                        rejected: this.msg.propostas.status.rejected
                    };
                    return labels[status] || status;
                },
                viewProposal(id) {
                    window.location.href = 'detalhesPropossta.html?proposal=' + id;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
