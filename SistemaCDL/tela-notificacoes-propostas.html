<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet">
    <link href="theme.css" rel="stylesheet" />
    <title>Propostas - Notificações</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="tela-layout">
    <div id="app">
        <div class="screen">
            <div class="shell">
                <aside class="sidebar">
                    <div class="brand">
                        <span class="brand-icon"></span>
                        <span>{{ msg.tela.brand }}</span>
                    </div>
                    <div class="menu">
                        <div class="menu-item">{{ msg.tela.menu.desafios }}</div>
                        <div class="menu-item">{{ msg.tela.menu.minhasPropostas }}</div>
                        <div class="menu-item active">{{ msg.tela.menu.notificacoes }}</div>
                    </div>
                </aside>
                <div class="content">
                    <div class="tabbar">
                        <span class="tab">{{ msg.tela.tabs.todas }}</span>
                        <span class="tab active">{{ msg.tela.tabs.propostasEmpresas }}</span>
                        <span class="tab">{{ msg.tela.tabs.desafios }}</span>
                    </div>
                    <div class="notifications-stack cards-grid">
                        <div
                            class="notify-card card"
                            v-for="notification in msg.notificacoesPropostas.notifications"
                            :key="notification.title"
                            :class="notification.type || ''"
                        >
                            <div class="notify-mark"></div>
                            <div class="notify-content card-body">
                                <h3>{{ notification.title }}</h3>
                                <p>{{ notification.description }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
    </div>
    <script src="messages.js"></script>
    <script>
        const { createApp } = Vue;

        document.addEventListener('DOMContentLoaded', function() {
            if (window.messages) {
                createApp({
                    data() {
                        return {
                            msg: window.messages
                        };
                    }
                }).mount('#app');

                document.title = window.messages.notificacoesPropostas.title;
            } else {
                console.error('Messages not loaded');
            }
        });
    </script>
</body>
</html>
