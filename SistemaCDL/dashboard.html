<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link href="theme.css" rel="stylesheet" />
    <title>Dashboard - Sistema de Desafios</title>
    <script src="messages.js" defer></script>
</head>
<body class="tela-layout">
    <div class="screen">
        <div class="shell">
            <aside class="sidebar">
                <div class="sidebar-brand">
                    <a href="index.html">Desafios</a>
                </div>
                <nav class="sidebar-menu">
                    <a href="index.html" class="menu-item">Início</a>
                    <a href="dashboard.html" class="menu-item active">Dashboard</a>
                    <a href="tela-inicial-desafios.html" class="menu-item">Desafios</a>
                    <a href="propostas.html" class="menu-item">Propostas</a>
                    <a href="CadastroEmpresa.html" class="menu-item">Empresa</a>
                    <a href="CadastroInstituicao.html" class="menu-item">Instituição</a>
                </nav>
            </aside>
            <div class="content">
                <div id="app"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp } = Vue;

        const Dashboard = {
            template: `
            <div>
                <div class="page-header">
                    <h1>{{ msg.dashboard.title || 'Dashboard' }}</h1>
                    <p>{{ msg.dashboard.subtitulo || 'Acompanhe seus desafios' }}</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-icon"></div>
                        <div class="stat-value">12</div>
                        <div class="stat-label">{{ msg.dashboard.desafiosAtivos || 'Desafios Ativos' }}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon"></div>
                        <div class="stat-value">8</div>
                        <div class="stat-label">{{ msg.dashboard.concluidos || 'Concluídos' }}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon"></div>
                        <div class="stat-value">4</div>
                        <div class="stat-label">{{ msg.dashboard.emAndamento || 'Em Andamento' }}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-icon"></div>
                        <div class="stat-value">24</div>
                        <div class="stat-label">{{ msg.dashboard.participantes || 'Participantes' }}</div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>{{ msg.dashboard.desafios || 'Desafios' }}</h2>
                    <div class="challenges">
                        <div class="challenge">
                            <div class="challenge-title">Desafio #001: Sistema Web</div>
                            <div>Progresso: 75%</div>
                            <div class="progress-bar" style="margin-top: 0.5rem;"><div class="progress-fill" style="width: 75%;"></div></div>
                        </div>
                        <div class="challenge">
                            <div class="challenge-title">Desafio #002: API REST</div>
                            <div>Progresso: 100% ✓</div>
                            <div class="progress-bar" style="margin-top: 0.5rem;"><div class="progress-fill" style="width: 100%;"></div></div>
                        </div>
                        <div class="challenge">
                            <div class="challenge-title">Desafio #003: Mobile App</div>
                            <div>Progresso: 45%</div>
                            <div class="progress-bar" style="margin-top: 0.5rem;"><div class="progress-fill" style="width: 45%;"></div></div>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>{{ msg.dashboard.atividades || 'Atividades' }}</h2>
                    <div class="activities">
                        <div class="activity">
                            <div class="activity-icon"></div>
                            <div class="activity-content">
                                <div class="activity-title">Novo desafio criado</div>
                                <div class="activity-time">Há 2 horas</div>
                            </div>
                        </div>
                        <div class="activity">
                            <div class="activity-icon"></div>
                            <div class="activity-content">
                                <div class="activity-title">Novo comentário recebido</div>
                                <div class="activity-time">Há 4 horas</div>
                            </div>
                        </div>
                        <div class="activity">
                            <div class="activity-icon"></div>
                            <div class="activity-content">
                                <div class="activity-title">Desafio concluído</div>
                                <div class="activity-time">Há 1 dia</div>
                            </div>
                        </div>
                        <div class="activity">
                            <div class="activity-icon"></div>
                            <div class="activity-content">
                                <div class="activity-title">Novo participante</div>
                                <div class="activity-time">Há 2 dias</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `,
            data() {
                return { 
                    msg: messages
                };
            }
        };

        createApp(Dashboard).mount('#app');
    </script>
</body>
</html>
