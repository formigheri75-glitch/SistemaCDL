<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
        <link href="theme.css" rel="stylesheet" />
        <title>Notificações</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="config.js"></script>
        <script src="commons.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <side-nav
                    :brand="msg.tela.brand"
                    :items="menuItems"
                    active-href="notificacoes.html"
                ></side-nav>
                <div class="content">
                    <div class="tabbar">
                        <span class="tab" :class="{ active: activeTab === 'todas' }" @click="activeTab = 'todas'">{{ msg.tela.tabs.todas }}</span>
                        <span class="tab" :class="{ active: activeTab === 'propostas' }" @click="activeTab = 'propostas'">{{ msg.tela.tabs.propostas }}</span>
                        <span class="tab" :class="{ active: activeTab === 'desafios' }" @click="activeTab = 'desafios'">{{ msg.tela.tabs.desafios }}</span>
                    </div>

                    <div v-if="activeTab === 'todas'" class="notifications-stack cards-grid">
                        <div class="notify-card card" v-for="notification in allNotifications" :key="notification.title" :class="notification.type || ''">
                            <div class="notify-mark"></div>
                            <div class="notify-content card-body">
                                <h3>{{ notification.title }}</h3>
                                <p>{{ notification.description }}</p>
                            </div>
                        </div>
                    </div>

                    <div v-if="activeTab === 'propostas'" class="notifications-stack cards-grid">
                        <div class="notify-card card" v-for="notification in proposalNotifications" :key="notification.title" :class="notification.type || ''">
                            <div class="notify-mark"></div>
                            <div class="notify-content card-body">
                                <h3>{{ notification.title }}</h3>
                                <p>{{ notification.description }}</p>
                            </div>
                        </div>
                    </div>

                    <div v-if="activeTab === 'desafios'" class="notifications-stack cards-grid">
                        <div class="notify-card card" v-for="notification in challengeNotifications" :key="notification.title" :class="notification.type || ''">
                            <div class="notify-mark"></div>
                            <div class="notify-content card-body">
                                <h3>{{ notification.title }}</h3>
                                <p>{{ notification.description }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (!window.messages) return console.error('Messages not loaded');

                mountVuePage({
                    title: 'Notificações',
                    components: { SideNav },
                    data() {
                        return {
                            msg: window.messages,
                            activeTab: 'todas',
                            allNotifications: [],
                            proposalNotifications: [],
                            challengeNotifications: [],
                            menuItems: [
                                {
                                    label: 'Início',
                                    href: window.AppRoutes ? window.AppRoutes.getHomeUrl() : 'tela-inicial-instituicao.html',
                                },
                                {
                                    label: window.messages.tela.menu.notificacoes,
                                    href: 'notificacoes.html',
                                },
                                {
                                    label: 'Propostas',
                                    href: window.AppRoutes ? window.AppRoutes.getProposalsUrl() : 'tela-propostas-instituicao.html',
                                },
                            ],
                        };
                    },
                    mounted: async function() {
                        try {
                            const data = await window.ApiClient.get('/notificacoes');
                            const mapped = (data || []).map(n => ({
                                title: n.titulo || n.nome || 'Notificação',
                                description: n.descricao || n.lista || '',
                                type: (String(n.tipo || '').toLowerCase().includes('proposta') ? 'proposal' : 'challenge')
                            }));

                            this.allNotifications = mapped;
                            this.proposalNotifications = mapped.filter(n => n.type === 'proposal');
                            this.challengeNotifications = mapped.filter(n => n.type !== 'proposal');
                        } catch (e) {
                            console.error('Erro ao carregar notificações:', e);
                            this.proposalNotifications = window.messages.notificacoesPropostas.notifications || [];
                            this.challengeNotifications = window.messages.notificacoesDesafios.notifications || [];
                            this.allNotifications = [
                                ...this.challengeNotifications,
                                ...this.proposalNotifications,
                            ];
                        }
                    }
                });
            });
        </script>
    </body>
</html>
