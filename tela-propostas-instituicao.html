<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
        <link href="theme.css" rel="stylesheet" />
        <title>Propostas - Instituição</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <aside class="sidebar"><div class="brand"><span class="brand-icon"></span><span>{{ msg.tela.brand }}</span></div><div class="menu"><div class="menu-item">Desafios</div><div class="menu-item active">Propostas</div><div class="menu-item">Notificações</div></div></aside>
                <div class="content">
                    <div class="section-head"><h2>Propostas recebidas</h2><a class="link-chip" href="notificacoes.html">Ver notificações</a></div>
                    <div class="list cards-grid">
                        <div class="proposal-card card" v-for="proposal in proposals" :key="proposal.title">
                            <div class="proposal-mark"></div>
                            <div class="proposal-content card-body">
                                <div>
                                    <h3>{{ proposal.title }}</h3>
                                    <p>{{ proposal.challenge }}</p>
                                </div>
                                <div class="proposal-actions">
                                    <span class="status-pill analysis">Em análise</span>
                                    <a class="mini-btn" href="tela-detalhes-proposta-coordenador.html">Ver detalhes</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            const { createApp } = Vue;
            createApp({
                data() {
                    return {
                        msg: window.messages,
                        proposals: [
                            { title: 'Gamificação do ensino híbrido', challenge: 'Inovação em Educação Digital' },
                            { title: 'Eficiência energética no campus', challenge: 'Sustentabilidade no Campus' },
                            { title: 'Aplicativo de impacto social', challenge: 'Startup de Impacto Social' },
                        ],
                    };
                },
            }).mount('#app');
            document.title = 'Propostas - Instituição';
        </script>
    </body>
</html>
