<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Criar Problema</title>
        <link
            href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap"
            rel="stylesheet"
        />
        <link href="theme.css" rel="stylesheet" />
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="config.js"></script>
        <script src="commons.js"></script>
        <script src="messages.js"></script>
    </head>
    <body class="tela-layout">
        <div id="app" class="screen">
            <div class="shell">
                <side-nav
                    :brand="msg.nav.brand"
                    :items="menuItems"
                    active-href="criaProblema.html"
                ></side-nav>
                <div class="content">
                    <!-- Main Content -->
                    <div class="container container-narrow">
                        <h1>{{ msg.criaProblema.title }}</h1>

                        <div class="form-wrapper">
                            <div v-if="showAlert" :class="['alert', alertType]">
                                {{ alertMessage }}
                            </div>

                            <form @submit.prevent="submitForm">
                                <!-- Title -->
                                <div class="form-group">
                                    <label for="title"
                                        >{{ msg.criaProblema.titulo }}</label
                                    >
                                    <input
                                        type="text"
                                        id="title"
                                        v-model="form.title"
                                        :placeholder="msg.criaProblema.tituloPlaceholder"
                                        required
                                    />
                                </div>

                                <!-- Description -->
                                <div class="form-group">
                                    <label for="description"
                                        >{{ msg.criaProblema.descricao }}</label
                                    >
                                    <textarea
                                        id="description"
                                        v-model="form.description"
                                        :placeholder="msg.criaProblema.descricaoPlaceholder"
                                        required
                                    ></textarea>
                                </div>

                                <!-- Expected Result -->
                                <div class="form-group">
                                    <label for="expectedResult"
                                        >{{ msg.criaProblema.resultado }}</label
                                    >
                                    <textarea
                                        id="expectedResult"
                                        v-model="form.expectedResult"
                                        :placeholder="msg.criaProblema.resultadoPlaceholder"
                                        required
                                    ></textarea>
                                </div>

                                <!-- Deadline -->
                                <div class="form-group">
                                    <label for="deadline"
                                        >{{ msg.criaProblema.deadline }}</label
                                    >
                                    <input
                                        type="number"
                                        id="deadline"
                                        v-model.number="form.deadline"
                                        min="1"
                                        max="365"
                                        placeholder="30"
                                        required
                                    />
                                </div>

                                <!-- Category and Priority -->
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="category"
                                            >{{ msg.criaProblema.categoria
                                            }}</label
                                        >
                                        <select
                                            id="category"
                                            v-model="form.category"
                                            required
                                        >
                                            <option value="">
                                                {{
                                                msg.criaProblema.seleccionarCategoria
                                                }}
                                            </option>
                                            <option value="backend">
                                                {{
                                                msg.criaProblema.categorias.backend
                                                }}
                                            </option>
                                            <option value="frontend">
                                                {{
                                                msg.criaProblema.categorias.frontend
                                                }}
                                            </option>
                                            <option value="mobile">
                                                {{
                                                msg.criaProblema.categorias.mobile
                                                }}
                                            </option>
                                            <option value="devops">
                                                {{
                                                msg.criaProblema.categorias.devops
                                                }}
                                            </option>
                                            <option value="data">
                                                {{
                                                msg.criaProblema.categorias.data
                                                }}
                                            </option>
                                            <option value="design">
                                                {{
                                                msg.criaProblema.categorias.design
                                                }}
                                            </option>
                                            <option value="other">
                                                {{
                                                msg.criaProblema.categorias.outro
                                                }}
                                            </option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="priority"
                                            >{{ msg.criaProblema.prioridade
                                            }}</label
                                        >
                                        <select
                                            id="priority"
                                            v-model="form.priority"
                                            required
                                        >
                                            <option value="">
                                                {{
                                                msg.criaProblema.seleccionarPrioridade
                                                }}
                                            </option>
                                            <option value="low">
                                                {{
                                                msg.criaProblema.prioridades.baixa
                                                }}
                                            </option>
                                            <option value="medium">
                                                {{
                                                msg.criaProblema.prioridades.media
                                                }}
                                            </option>
                                            <option value="high">
                                                {{
                                                msg.criaProblema.prioridades.alta
                                                }}
                                            </option>
                                            <option value="critical">
                                                {{
                                                msg.criaProblema.prioridades.critica
                                                }}
                                            </option>
                                        </select>
                                    </div>
                                </div>

                                <!-- Technologies -->
                                <div class="form-group">
                                    <label for="technologies"
                                        >{{ msg.criaProblema.tecnologias
                                        }}</label
                                    >
                                    <input
                                        type="text"
                                        id="technologies"
                                        v-model="form.technologies"
                                        :placeholder="msg.criaProblema.tecnologiasPlaceholder"
                                    />
                                </div>

                                <!-- Requirements -->
                                <div class="form-group">
                                    <label
                                        >{{ msg.criaProblema.requisitos
                                        }}</label
                                    >
                                    <div class="requirements-section">
                                        <div
                                            v-for="(req, index) in form.requirements"
                                            :key="index"
                                            class="requirement-item"
                                        >
                                            <input
                                                type="text"
                                                v-model="form.requirements[index]"
                                                placeholder="Ex: Suportar 10000 requisições/segundo"
                                            />
                                            <button
                                                type="button"
                                                class="btn btn-secondary"
                                                @click="removeRequirement(index)"
                                            >
                                                {{ msg.criaProblema.remover }}
                                            </button>
                                        </div>
                                        <button
                                            type="button"
                                            class="btn btn-secondary"
                                            @click="addRequirement"
                                        >
                                            {{
                                            msg.criaProblema.adicionarRequisito
                                            }}
                                        </button>
                                    </div>
                                </div>

                                <!-- Buttons -->
                                <div class="button-group">
                                    <button type="submit" class="btn btn-primary">
                                        {{ msg.criaProblema.publicar }}
                                    </button>
                                    <button
                                        type="button"
                                        class="btn btn-secondary"
                                        @click="cancelForm"
                                    >
                                        {{ msg.criaProblema.cancelar }}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const { createApp } = Vue;

            document.addEventListener("DOMContentLoaded", function () {
                if (window.messages) {
                    createApp({
                        components: { SideNav },
                        data() {
                            return {
                                msg: window.messages,
                                menuItems: [
                                    { label: window.messages.nav.dashboard, href: 'empresaDashboard.html' },
                                    { label: window.messages.nav.novoProblema, href: 'criaProblema.html' },
                                    { label: window.messages.nav.propostas, href: 'propostas.html' },
                                ],
                                form: {
                                    title: "",
                                    description: "",
                                    expectedResult: "",
                                    deadline: "",
                                    category: "",
                                    priority: "",
                                    technologies: "",
                                    requirements: [""],
                                },
                                showAlert: false,
                                alertMessage: "",
                                alertType: "success",
                            };
                        },
                        methods: {
                            addRequirement() {
                                this.form.requirements.push("");
                            },
                            removeRequirement(index) {
                                this.form.requirements.splice(index, 1);
                            },
                            async submitForm() {
                                if (
                                    !this.form.title ||
                                    !this.form.description ||
                                    !this.form.expectedResult ||
                                    !this.form.category ||
                                    !this.form.priority ||
                                    !this.form.deadline
                                ) {
                                    this.alertMessage =
                                        this.msg.criaProblema.erro;
                                    this.alertType = "error";
                                    this.showAlert = true;
                                    return;
                                }

                                try {
                                    const response = await window.ApiClient.post('/desafios', {
                                        titulo: this.form.title,
                                        descricao: this.form.description,
                                        resultado_esperado: this.form.expectedResult,
                                        categoria: this.form.category,
                                        prioridade: this.form.priority,
                                        prazo_dias: parseInt(this.form.deadline),
                                        tecnologias: this.form.technologies ? this.form.technologies.split(',').map(t => t.trim()) : [],
                                        requisitos: this.form.requirements.filter(r => r.trim() !== '')
                                    });
                                    
                                    this.alertMessage = this.msg.criaProblema.sucesso;
                                    this.alertType = "success";
                                    this.showAlert = true;

                                    setTimeout(() => {
                                        window.location.href = "empresaDashboard.html";
                                    }, 1500);
                                } catch (error) {
                                    this.alertMessage = error.message || this.msg.criaProblema.erro;
                                    this.alertType = "error";
                                    this.showAlert = true;
                                }
                            },
                            cancelForm() {
                                window.location.href = "empresaDashboard.html";
                            },
                        },
                    }).mount("#app");
                }
            });
        </script>
    </body>
</html>
